apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: qwen36-35b
  namespace: vllm
spec:
  replicas: 1
  leaderWorkerTemplate:
    size: 2
    restartPolicy: RecreateGroupOnPodRestart
    leaderTemplate:
      metadata:
        labels:
          role: leader
      spec:
        nodeSelector:
          name: nodepool-gpu-01
        tolerations:
          - key: nvidia.com/gpu
            operator: Equal
            value: present
            effect: NoSchedule
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchExpressions:
                    - key: leaderworkerset.sigs.k8s.io/name
                      operator: In
                      values: ["qwen36-35b"]
                topologyKey: kubernetes.io/hostname
        containers:
          - name: vllm-leader
            image: vllm/vllm-openai:latest
            env:
              - name: NCCL_IB_DISABLE
                value: "1"
            command:
              - sh
              - -c
              - |
                exec vllm serve /models/qwen3.6-35b-a3b \
                  --served-model-name qwen3.6-35b \
                  --port 8080 \
                  --tensor-parallel-size 2 \
                  --pipeline-parallel-size 2 \
                  --nnodes $(LWS_GROUP_SIZE) \
                  --node-rank $(LWS_WORKER_INDEX) \
                  --master-addr $(LWS_LEADER_ADDRESS) \
                  --dtype bfloat16 \
                  --max-model-len 16384 \
                  --reasoning-parser qwen3 \
                  --enable-auto-tool-choice \
                  --tool-call-parser qwen3_coder \
                  --language-model-only \
                  --gpu-memory-utilization 0.92 \
                  --trust-remote-code
            resources:
              limits:
                nvidia.com/gpu: "2"
                memory: 96Gi
                cpu: "28"
                ephemeral-storage: 50Gi
              requests:
                nvidia.com/gpu: "2"
                memory: 96Gi
                cpu: "28"
                ephemeral-storage: 50Gi
            ports:
              - containerPort: 8080
            readinessProbe:
              tcpSocket:
                port: 8080
              initialDelaySeconds: 120
              periodSeconds: 15
              failureThreshold: 60
            volumeMounts:
              - mountPath: /dev/shm
                name: dshm
              - mountPath: /models
                name: model-cache
                readOnly: true
        volumes:
          - name: dshm
            emptyDir:
              medium: Memory
              sizeLimit: 15Gi
          - name: model-cache
            persistentVolumeClaim:
              claimName: model-cache-rwx
    workerTemplate:
      spec:
        nodeSelector:
          name: nodepool-gpu-01
        tolerations:
          - key: nvidia.com/gpu
            operator: Equal
            value: present
            effect: NoSchedule
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchExpressions:
                    - key: leaderworkerset.sigs.k8s.io/name
                      operator: In
                      values: ["qwen36-35b"]
                topologyKey: kubernetes.io/hostname
        containers:
          - name: vllm-worker
            image: vllm/vllm-openai:latest
            env:
              - name: NCCL_IB_DISABLE
                value: "1"
            command:
              - sh
              - -c
              - |
                exec vllm serve /models/qwen3.6-35b-a3b \
                  --tensor-parallel-size 2 \
                  --pipeline-parallel-size 2 \
                  --nnodes $(LWS_GROUP_SIZE) \
                  --node-rank $(LWS_WORKER_INDEX) \
                  --master-addr $(LWS_LEADER_ADDRESS) \
                  --headless \
                  --dtype bfloat16 \
                  --max-model-len 16384 \
                  --trust-remote-code
            resources:
              limits:
                nvidia.com/gpu: "2"
                memory: 96Gi
                cpu: "28"
                ephemeral-storage: 50Gi
              requests:
                nvidia.com/gpu: "2"
                memory: 96Gi
                cpu: "28"
                ephemeral-storage: 50Gi
            volumeMounts:
              - mountPath: /dev/shm
                name: dshm
              - mountPath: /models
                name: model-cache
                readOnly: true
        volumes:
          - name: dshm
            emptyDir:
              medium: Memory
              sizeLimit: 15Gi
          - name: model-cache
            persistentVolumeClaim:
              claimName: model-cache-rwx
---
apiVersion: v1
kind: Service
metadata:
  name: qwen36-35b-api
  namespace: vllm
spec:
  selector:
    leaderworkerset.sigs.k8s.io/name: qwen36-35b
    role: leader
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: 8080
  type: ClusterIP