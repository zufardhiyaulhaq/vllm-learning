apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-server
  namespace: vllm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nfs-server
  template:
    metadata:
      labels:
        app: nfs-server
    spec:
      containers:
        - name: nfs-server
          image: itsthenetwork/nfs-server-alpine:12
          env:
            - name: SHARED_DIRECTORY
              value: /exports
          ports:
            - containerPort: 2049
            - containerPort: 20048
            - containerPort: 111
          securityContext:
            privileged: true
          volumeMounts:
            - name: backing
              mountPath: /exports
      volumes:
        - name: backing
          persistentVolumeClaim:
            claimName: model-cache
---
apiVersion: v1
kind: Service
metadata:
  name: nfs-server
  namespace: vllm
spec:
  selector:
    app: nfs-server
  ports:
    - name: nfs
      port: 2049
      targetPort: 2049
    - name: mountd
      port: 20048
      targetPort: 20048
    - name: rpcbind
      port: 111
      targetPort: 111
  type: ClusterIP